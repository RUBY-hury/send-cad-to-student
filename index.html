<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>摇号抽CAD图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
    color:#ccd6f6;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;
}
.hdr{text-align:center;margin-bottom:20px}
.tit{font-size:36px;font-weight:bold;color:#f0c040;text-shadow:0 2px 12px rgba(240,192,64,.4)}
.sub{font-size:15px;color:#8892b0;margin-top:6px}
.whl{position:relative;width:330px;height:330px;margin:0 auto 20px}
#wc{width:330px;height:330px}
.ptr{position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:30px solid #ff4757;z-index:10;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.rc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border-radius:50%;background:rgba(26,26,46,.95);display:none;flex-direction:column;align-items:center;justify-content:center;border:3px solid #f0c040;box-shadow:0 0 20px rgba(240,192,64,.3)}
.rc.s{display:flex}
.rn{font-size:38px;font-weight:bold;color:#f0c040}
.rl{font-size:14px;color:#8892b0;margin-top:2px}
.fm{width:100%;max-width:380px;background:rgba(255,255,255,.06);border-radius:16px;padding:20px;margin:0 auto}
.fr{display:flex;align-items:center;margin-bottom:14px}
.fr:last-child{margin-bottom:0}
.fl{width:50px;font-size:15px;color:#ccd6f6;flex-shrink:0}
.fi{flex:1;height:44px;background:rgba(255,255,255,.1);border-radius:10px;padding:0 14px;font-size:15px;color:#fff;outline:none;border:2px solid rgba(255,255,255,.12);transition:border-color .2s}
.fi:focus{border-color:#f0c040}
.fi::placeholder{color:rgba(255,255,255,.3)}
.bw{margin:20px 0;text-align:center}
.sb{width:280px;height:52px;background:linear-gradient(135deg,#f0c040,#e0a800);color:#1a1a2e;font-size:20px;font-weight:bold;border-radius:26px;cursor:pointer;border:none;box-shadow:0 4px 16px rgba(240,192,64,.35);transition:.2s}
.sb:active{transform:scale(.96);opacity:.85}
.sb:disabled{background:linear-gradient(135deg,#555,#444);color:#888;box-shadow:none;cursor:not-allowed}
.sd{width:100%;max-width:380px;margin:0 auto 16px;padding:14px 18px;border-radius:12px;font-size:14px;text-align:center;display:none;align-items:center;justify-content:center;gap:8px}
.sd.s{display:flex}
.sd.ok{background:rgba(76,175,80,.2);color:#4caf50;border:1px solid rgba(76,175,80,.3)}
.sd.er{background:rgba(244,67,54,.2);color:#f44336;border:1px solid rgba(244,67,54,.3)}
.sd.in{background:rgba(33,150,243,.2);color:#2196f3;border:1px solid rgba(33,150,243,.3)}
.hs{width:100%;max-width:380px;background:rgba(255,255,255,.05);border-radius:16px;padding:18px;display:none}
.hs.s{display:block}
.ht{font-size:17px;font-weight:bold;color:#ccd6f6;margin-bottom:12px}
.hl{max-height:240px;overflow-y:auto}
.hi{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px}
.hi:last-child{border-bottom:none}
.hn{color:#f0c040;font-weight:bold;min-width:60px}
.hm{color:#ccd6f6;min-width:60px}
.he{color:#8892b0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hv{min-width:60px;text-align:right}
.hok{color:#4caf50}
.hfl{color:#f44336}
.xb{margin:10px 0 0;text-align:center}
.xb button{background:rgba(255,255,255,.1);color:#8892b0;border:1px solid rgba(255,255,255,.15);padding:8px 24px;border-radius:8px;cursor:pointer;font-size:13px}
.xb button:hover{color:#f0c040;border-color:#f0c040}
</style>
</head>
<body>

<div class="hdr">
    <div class="tit">🎯 摇号抽CAD图</div>
    <div class="sub">1 - 70 号图纸随机抽取</div>
</div>

<div class="whl">
    <canvas id="wc"></canvas>
    <div class="ptr"></div>
    <div class="rc" id="rc">
        <div class="rn" id="rn">-</div>
        <div class="rl">号图纸</div>
    </div>
</div>

<div class="fm">
    <div class="fr"><span class="fl">学号</span><input class="fi" id="sid" placeholder="请输入学号" autocomplete="off"></div>
    <div class="fr"><span class="fl">姓名</span><input class="fi" id="nm" placeholder="请输入姓名" autocomplete="off"></div>
    <div class="fr"><span class="fl">邮箱</span><input class="fi" id="em" placeholder="请输入邮箱（每人限摇一次）" autocomplete="off"></div>
</div>

<div class="bw">
    <button class="sb" id="sb" onclick="spin()">🎰 开始摇号</button>
</div>

<div class="sd" id="sd"><span id="si"></span><span id="sm"></span></div>

<div class="hs" id="hs">
    <div class="ht">摇号记录</div>
    <div class="hl" id="hl"></div>
    <div class="xb"><button onclick="exportExcel()">📥 导出Excel</button></div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
const TOTAL = 70;
let a = 0, ta = 0, aid = null, sp = false, dl = false, rn = null;
let hist = JSON.parse(localStorage.getItem('lt_hist') || '[]');
if(hist.length) renderHist();

// --- canvas ---
function ic() {
    const c = document.getElementById('wc'), d = devicePixelRatio || 1;
    const rc = c.getBoundingClientRect();
    c.width = rc.width * d; c.height = rc.height * d;
    const x = c.getContext('2d'); x.scale(d, d);
    const w = rc.width, h = rc.height, cx = w / 2, cy = h / 2, r = Math.min(w, h) / 2 - 20;
    return { x, w, h, cx, cy, r };
}

function dw(ang) {
    const { x, w, h, cx, cy, r } = ic();
    x.clearRect(0, 0, w, h);

    x.beginPath(); x.arc(cx, cy, r + 8, 0, Math.PI * 2);
    x.fillStyle = 'rgba(240,192,64,.05)'; x.fill();

    x.beginPath(); x.arc(cx, cy, r + 3, 0, Math.PI * 2);
    x.strokeStyle = 'rgba(240,192,64,.2)'; x.lineWidth = 2; x.stroke();

    const seg = (2 * Math.PI) / TOTAL;
    for (let i = 1; i <= TOTAL; i++) {
        const sa = ang + (i - 1) * seg - Math.PI / 2, ea = sa + seg;
        x.beginPath(); x.moveTo(cx, cy); x.arc(cx, cy, r, sa, ea); x.closePath();
        const g = x.createRadialGradient(cx, cy, r * .3, cx, cy, r);
        if (i % 2) { g.addColorStop(0, 'rgba(240,192,64,.12)'); g.addColorStop(.7, 'rgba(240,192,64,.25)'); g.addColorStop(1, 'rgba(240,192,64,.4)'); }
        else { g.addColorStop(0, 'rgba(197,144,32,.08)'); g.addColorStop(.7, 'rgba(197,144,32,.2)'); g.addColorStop(1, 'rgba(197,144,32,.35)'); }
        x.fillStyle = g; x.fill();
        x.beginPath(); x.moveTo(cx, cy); x.lineTo(cx + r * Math.cos(sa), cy + r * Math.sin(sa));
        x.strokeStyle = 'rgba(26,26,46,.5)'; x.lineWidth = .5; x.stroke();

        const ma = sa + seg / 2, tr = r - 22;
        const tx = cx + tr * Math.cos(ma), ty = cy + tr * Math.sin(ma);
        x.save(); x.translate(tx, ty); x.rotate(ma + Math.PI / 2);
        x.fillStyle = i % 10 === 0 ? '#fff' : '#ccd6f6';
        x.font = 'bold 11px sans-serif'; x.textAlign = 'center'; x.textBaseline = 'middle';
        x.fillText(String(i), 0, 0); x.restore();
    }

    x.beginPath(); x.arc(cx, cy, r - 34, 0, Math.PI * 2);
    x.strokeStyle = 'rgba(240,192,64,.35)'; x.lineWidth = 2; x.stroke();

    x.beginPath(); x.arc(cx, cy, r - 36, 0, Math.PI * 2);
    const ig = x.createRadialGradient(cx, cy, 0, cx, cy, r - 36);
    ig.addColorStop(0, 'rgba(15,12,41,.95)'); ig.addColorStop(1, 'rgba(26,26,46,.88)');
    x.fillStyle = ig; x.fill();
}

// --- helpers ---
function $g(id) { return document.getElementById(id); }
function ub() {
    const b = $g('sb');
    if (sp) { b.textContent = '🎰 摇号中...'; b.disabled = true; }
    else if (dl) { b.textContent = '⏳ 下载中...'; b.disabled = true; }
    else { b.textContent = rn ? '🔄 再摇一次' : '🎰 开始摇号'; b.disabled = false; }
}
function ss(tp, ic, msg) {
    const b = $g('sd'); b.className = 'sd ' + tp + ' s';
    $g('si').textContent = ic; $g('sm').textContent = msg;
}

function addHist(num, sid, nm, em, ok) {
    hist.unshift({ num, sid, nm, em, ok, time: Date.now() });
    if (hist.length > 50) hist.pop();
    localStorage.setItem('lt_hist', JSON.stringify(hist));
    renderHist();
}
function renderHist() {
    const s = $g('hs'), l = $g('hl');
    if (!hist.length) { s.classList.remove('s'); return; }
    s.classList.add('s');
    l.innerHTML = hist.map(h => `<div class="hi"><span class="hn">第${h.num}号</span><span class="hm">${h.nm}</span><span class="he">${h.em}</span><span class="hv ${h.ok?'hok':'hfl'}">${h.ok?'✓已发送':'✗失败'}</span></div>`).join('');
}
function findBySid(sid) { return hist.find(h => h.sid === sid); }
function findByEmail(em) { return hist.some(h => h.em === em); }

// --- spin ---
function spin() {
    if (sp || dl) return;
    const sid = $g('sid').value.trim(), nm = $g('nm').value.trim(), em = $g('em').value.trim();
    if (!sid) return alert('请输入学号');
    if (!nm) return alert('请输入姓名');
    if (!em) return alert('请输入邮箱');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) return alert('邮箱格式不正确');

    const prev = findBySid(sid);
    if (prev) {
        // 同一学号再次摇号：直接重发之前的图纸
        rn = prev.num; $g('rn').textContent = prev.num; $g('rc').classList.add('s');
        ss('in', '📧', `你之前摇中第${prev.num}号图纸，正在重新发送...`);
        dl = true; ub(); done(prev.num); return;
    }
    if (findByEmail(em)) return alert('该邮箱已被其他学号使用，不能重复摇号');

    const tn = Math.floor(Math.random() * TOTAL) + 1;
    const seg = (2 * Math.PI) / TOTAL;
    const nc = (tn - 1) * seg + seg / 2;
    const off = -Math.PI / 2 - nc;
    const spins = (4 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
    ta = a + spins + off;

    sp = true; rn = null; $g('rc').classList.remove('s'); $g('sd').classList.remove('s'); ub();

    const sa = a, dur = 5000 + Math.random() * 2000, st = Date.now();
    (function anim() {
        const el = Date.now() - st, p = Math.min(el / dur, 1);
        a = sa + (ta - sa) * (1 - Math.pow(1 - p, 3));
        dw(a);
        if (p < 1) { aid = requestAnimationFrame(anim); }
        else { a = ta; aid = null; dw(a); sp = false; rn = tn; $g('rn').textContent = tn; $g('rc').classList.add('s'); ub(); done(tn); }
    })();
}

// --- send email ---
async function done(num) {
    const sid = $g('sid').value.trim(), nm = $g('nm').value.trim(), em = $g('em').value.trim();
    ss('in', '📧', `已摇中第${num}号图纸，正在发送邮件到 ${em}...`); dl = true; ub();
    try {
        const res = await fetch('/api/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ student_id: sid, name: nm, email: em, number: num }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '发送失败');
        ss('ok', '✓', data.message);
        addHist(num, sid, nm, em, true);
    } catch (e) {
        console.error(e);
        ss('er', '✗', e.message || '发送失败，请稍后重试');
        addHist(num, sid, nm, em, false);
    } finally { dl = false; ub(); }
}

// --- export ---
function exportExcel() {
    if (!hist.length) return alert('没有可导出的记录');
    const rows = hist.map((h, i) => ({
        '序号': i + 1, '学号': h.sid, '姓名': h.nm, '邮箱': h.em,
        '图纸编号': h.num, '时间': new Date(h.time).toLocaleString('zh-CN'),
        '状态': h.ok ? '已发送' : '失败'
    }));
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, '摇号记录');
    XLSX.writeFile(wb, '摇号记录_' + new Date().toISOString().slice(0, 10) + '.xlsx');
}

// --- init ---
addEventListener('DOMContentLoaded', () => dw(0));
addEventListener('resize', () => dw(a));
</script>
</body>
</html>
